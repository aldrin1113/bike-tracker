<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🏍️ Ride Tracker Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<style>
body { margin:0; background:#0d1117; color:white; font-family:sans-serif; }
#map { height:60vh; }

.controls {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 999;
}

button {
  padding: 10px 14px;
  border-radius: 25px;
  border: none;
  background: #238636;
  color: white;
}

.panel {
  margin: 10px;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
}
</style>
</head>

<body>

<h2 style="text-align:center;">🏍️ Ride Tracker</h2>

<div id="map"></div>

<div class="panel">
  <b>Riders</b>
  <div id="riderList"></div>
</div>

<div class="panel">
  <b>Active Rides</b>
  <div id="rideList"></div>
</div>

<div class="controls">
  <button onclick="createRide()">Start</button>
  <button onclick="shareRide()">Share</button>
  <button onclick="leaveRide()">Leave</button>
  <button onclick="endRide()">End</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyBz8Mmgcoi8GMH-YqNSRanTd8GRrK5vV6M",
  authDomain: "bike-ride-7fa01.firebaseapp.com",
  databaseURL: "https://bike-ride-7fa01-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "bike-ride-7fa01",
  storageBucket: "bike-ride-7fa01.firebasestorage.app",
  messagingSenderId: "98802522518",
  appId: "1:98802522518:web:5e53b78fa812615ee525b7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* MAP */
let map = L.map('map').setView([9.9312, 76.2673], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

/* GLOBALS */
let userId = "rider_" + Math.random().toString(36).substr(2, 9);
let groupId = null;
let riderName = null;
let watchId = null;

const markers = {};
const polylines = {};
let myPath = [];

/* WAKE LOCK */
let wakeLock = null;

async function enableWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
    }
  } catch(e) {
    console.log("WakeLock not supported");
  }
}

function disableWakeLock() {
  if (wakeLock) wakeLock.release();
}

/* CREATE RIDE */
function createRide() {
  groupId = "ride_" + Math.floor(Math.random() * 100000);

  db.ref(`groups/${groupId}`).set({
    status: "active",
    createdAt: Date.now()
  });

  alert("Ride created");
}

/* SHARE */
function shareRide() {
  if (!groupId) return alert("Start ride first");

  const link = `${window.location.origin}${window.location.pathname}?group=${groupId}`;
  navigator.clipboard.writeText(link);

  alert("Link copied");
}

/* AUTO JOIN */
window.onload = () => {

  loadActiveRides();

  const params = new URLSearchParams(window.location.search);
  groupId = params.get("group");

  if (!groupId) return;

  riderName = prompt("Enter name (cancel = view)");

  if (!riderName) {
    listenToGroup();
  } else {
    startTracking();
    listenToGroup();
  }
};

/* TRACK */
function startTracking() {
  enableWakeLock();

  watchId = navigator.geolocation.watchPosition((pos) => {

    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const speed = (pos.coords.speed || 0) * 3.6;

    myPath.push([lat, lng]);

    map.setView([lat, lng], 15);

    db.ref(`groups/${groupId}/riders/${userId}`).set({
      name: riderName,
      lat,
      lng,
      speed,
      path: myPath
    });

  }, (err)=>{
    alert("Enable location permission!");
  }, { enableHighAccuracy: true });
}

/* LISTEN */
function listenToGroup() {
  db.ref(`groups/${groupId}`).on("value", (snap) => {

    const data = snap.val();
    if (!data) return;

    const riders = data.riders || {};

    for (let id in riders) {
      const r = riders[id];

      if (!markers[id]) {
        markers[id] = L.circleMarker([r.lat, r.lng], {
          radius: 8,
          color: "lime"
        }).addTo(map);
      } else {
        markers[id].setLatLng([r.lat, r.lng]);
      }

      if (polylines[id]) map.removeLayer(polylines[id]);

      polylines[id] = L.polyline(r.path || [], {
        color: "cyan"
      }).addTo(map);
    }

    updateRiders(riders);
  });
}

/* RIDERS */
function updateRiders(riders) {
  const div = document.getElementById("riderList");
  div.innerHTML = "";

  for (let id in riders) {
    div.innerHTML += `${riders[id].name} - ${Math.round(riders[id].speed)} km/h <br>`;
  }
}

/* LEAVE */
function leaveRide() {
  if (!groupId) return;

  db.ref(`groups/${groupId}/riders/${userId}`).remove();
  stopTracking();
}

/* END */
function endRide() {
  if (!groupId) return;

  db.ref(`groups/${groupId}/status`).set("closed");
}

/* STOP */
function stopTracking() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  disableWakeLock();
}

/* ACTIVE RIDES */
function loadActiveRides() {
  db.ref("groups").on("value", (snap) => {
    const data = snap.val();
    const div = document.getElementById("rideList");

    div.innerHTML = "";

    if (!data) return;

    for (let id in data) {
      if (data[id].status === "active") {
        div.innerHTML += `🟢 ${id}<br>`;
      }
    }
  });
}

</script>

</body>
</html>
